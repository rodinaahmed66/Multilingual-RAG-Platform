services:
   pgvector:
      image: pgvector/pgvector:0.8.0-pg17
      container_name: pgvector
      ports:
         - "5432:5432"
      volumes:
         - pgvector_data:/var/lib/postgresql/data
      environment:
         - POSTGRES_PASSWORD=PASSWORD
         - POSTGRES_DB=minirag
      networks:
         - backend
      restart: always 
         
networks:
   backend:

volumes:

     pgvector_data:
